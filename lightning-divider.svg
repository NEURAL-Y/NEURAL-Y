<svg width="900" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0f0f2d"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="lineFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F7FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00F7FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00F7FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="90" fill="url(#bg)"/>

  <line x1="0" y1="45" x2="900" y2="45" stroke="url(#lineFade)" stroke-width="2">
    <animate attributeName="opacity" values="0.2;1;0.3;0.9;0.2" dur="2.4s" repeatCount="indefinite"/>
  </line>

  <!-- Left bolt -->
  <g filter="url(#glow)" transform="translate(120,15)">
    <path d="M22 0 L4 34 L18 34 L10 60 L36 24 L20 24 Z"
          fill="#00F7FF" stroke="#00F7FF" stroke-width="1">
      <animate attributeName="opacity" values="1;0.3;1;0.6;1" dur="1.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Center bolt (bigger) -->
  <g filter="url(#glow)" transform="translate(432,5)">
    <path d="M28 0 L5 42 L22 42 L12 75 L48 30 L26 30 Z"
          fill="#00F7FF" stroke="#ffffff" stroke-width="1">
      <animate attributeName="opacity" values="0.6;1;0.4;1;0.7" dur="1.1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Right bolt -->
  <g filter="url(#glow)" transform="translate(750,15)">
    <path d="M22 0 L4 34 L18 34 L10 60 L36 24 L20 24 Z"
          fill="#00F7FF" stroke="#00F7FF" stroke-width="1">
      <animate attributeName="opacity" values="1;0.5;1;0.2;1" dur="1.9s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
